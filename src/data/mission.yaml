- theme: "Ta'lim islohoti va falsafasi"
  mission: "O'zbekiston ta'lim tizimini yuzaki 'sertifikat tuzog'i'dan (masalan, IELTS ga mukkasidan ketish) tanqidiy fikrlash, erkin ta'lim va hayotning mazmunli falsafasi poydevoriga aylantirish."
  message: "Ta'lim shunchaki testlardan o'tishdan iborat bo'lmasligi kerak; u yoshlarga hayotiy maqsadlarini topishga va eskirgan modellar asosida ishlamasdan, avlodlar ziddiyatlarini hal qilishga yordam berishi lozim."

- theme: "Siyosiy uyg'onish va fuqarolik ishtiroki"
  mission: "O'zbekiston jamoatchiligi orasida siyosiy savodxonlikni oshirish, davlat monopoliyalarini kamaytirishni targ'ib qilish va chetga surilgan qatlamlar ovozini siyosiy jarayonga integratsiya qilishga undash."
  message: "Muxolifatsiz siyosiy tizim tabiatan zaifdir. O'zini siyosatdan uzilib qolgandek his qiladigan fuqarolar ('kuchsizlar') davlatni javobgarlikka tortish bo'yicha o'zlarining tabiiy huquq va salohiyatini anglab yetishlari kerak."

- theme: "Strategik suverenitet va geosiyosat"
  mission: "O'zbekistonni uzoq muddatli strategik rejalashtirish uchun chinakam intellektual salohiyatni shakllantirishga, yirik global kuchlarga qaramlikni kamaytirishga va xorijdagi himoyasiz o'zbek mehnat muhojirlarini faol himoya qilishga chaqirish."
  message: "Milliy strategiya faqatgina elita hokimiyatini saqlab qolishga emas, balki xalqning farovonligi va himoyasiga qaratilishi kerak. Bu esa diplomatik xilma-xillik va kelajakni ko'ra bilish qobiliyatini talab qiladi."

- theme: "Inson qadri va jamiyat qadriyatlari"
  mission: "Inson hayoti, qadri va psixologik farovonligi eng oliy mezon hisoblanadigan jamiyat tuzilmasini yaratish, shuningdek, yoshlar o'rtasida o'sib borayotgan tushkunlik va maqsadsizlikka qarshi faol kurashish."
  message: "Har qanday jamiyat qadriyatlarining haqiqiy o'lchovi uning o'z odamlariga qanday munosabatda bo'lishi bilan belgilanadi; intellektual erkinlik va aniq, mazmunli maqsadlarsiz jamiyat ekzistensial turg'unlik xavfi ostida qoladi."
