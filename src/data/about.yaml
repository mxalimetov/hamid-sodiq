biography: "Hamid Sodiq - taniqli o'zbek siyosatshunosi, tahlilchi va Huquqiy ta'lim va maslahat markazi direktori. 'Fikrat' tahliliy dasturining ekspert-tahlilchisi sifatida u O'zbekiston va kengroq mintaqadagi geosiyosat, davlat qurilishi va jamiyat rivojlanishi bo'yicha chuqur sharhlar berib boradi. Shuningdek, u fidoyi mutaxassis va tarjimon bo'lib, 'Vatandoshlik dasturi' va 'Kuchsizlar kuchi' kabi muhim siyosiy va fuqarolik matnlarini o'zbek tiliga tarjima qilgan."
