- id: t-2023-oyina-books
  date: "2023-11-07"
  title: "Siyosiy Ongni O'stiruvchi Kitoblar Tavsiyasi"
  description: >
    Oyina.uz portali loyihasi doirasida siyosatshunos Hamid Sodiq "Har bir inson hayoti davomida
    o'qishi shart bo'lgan 10 kitob" ro'yxatini e'lon qildi. Ular qatorida Vaslav Gavelning
    "Kuchsizlar kuchi" va Adib Xolidning "O'zbekiston tavalludi" asarlari bor edi.
  type: social
  analysis: >
    Sodiq bu kitoblarni shunchaki badiiy adabiyot emas, balki jamiyatda siyosiy ongni,
    erkinlikni va vatandoshlik hissini shakllantirish uchun zaruriy vosita sifatida tahlil qildi.
  prediction: >
    U jamiyat a'zolari o'z siyosiy va huquqiy savodxonligini oshirmas ekan,
    mamlakatda fuqarolik qadriyatlari to'laqonli qaror topmasligiga ishora qildi.
  source: "Oyina.uz, Noyabr 2023"

- id: t-2025-geopolitics-strategy
  date: "2025-07-29"
  title: "Yirik Davlatlar Ta'siri va Strategik Fikrlash"
  description: >
    Hamid Sodiq O'zbekistonning yirik davlatlar (xususan, Xitoy va Rossiya) bilan munosabatlarini
    boshqarishdagi strategik rejalashtirish salohiyati bo'yicha keskin fikrlarini bildirdi.
  type: geopolitical
  analysis: >
    U hukumatlarning tashqi siyosati intellektual salohiyatga emas, balki ko'pincha "hokimiyatni
    saqlab qolish" tabiiy instinktiga tayanishini va bu holat elitaning tashvishlari xalq
    farovonligidan ustun turishini anglatishini tahlil qildi.
  prediction: >
    Mintaqa davlatlari chuqur strategik fikrlash o'rniga faqat omon qolish instinkti bilan harakat qilsa,
    mustaqillik va iqtisodiyotga zarar yetishi hamda buning jabrini doim xalq tortishini ta'kidladi.
  source: "BBC Monitoring, Iyul 2025"

- id: t-2025-abror-muxtor-aliy-conflict
  date: "2025-11-07"
  title: "Tahlilchilarga Bosim va So'z Erkinligi Muhokamasi"
  description: >
    Diniy targ'ibotchi Abror Muxtor Aliy siyosatshunos Hamid Sodiqni "G'arb siyosatini O'zbekistonga
    tiqishtiruvchi xoin" deb atab chiqqanidan so'ng, mamlakat axborot maydonida so'z erkinligi
    bo'yicha yirik rezonans yuzaga keldi.
  type: social
  analysis: >
    Jamiyat faollari va ziyolilar Hamid Sodiqning faoliyati mamlakatda faol siyosiy-huquqiy ongni
    shakllantirishning asosi ekanligini ta'kidlab, asossiz va radikal qoralashlarni erkin fikrga
    tahdid sifatida tahlil qilishdi.
  prediction: >
    Intellektual va tahliliy fikr yurituvchilarni "dushman" yoki "xoin" sifatida ko'rsatishga
    urinishlar kelajakda fuqarolik jamiyatiga zarba berib, nafrat muhitini kuchaytirishi xavfi
    borligidan ogohlantirildi.
  source: "Gazeta.uz, Daryo.uz, Noyabr 2025"

- id: t-2026-migrants-dependency
  date: "2026-02-04"
  title: "Migrantlar Zaifligi va Tarkibiy Qaramlik"
  description: >
    Rossiyadagi o'zbek migrantlarining og'ir sharoitlari va ekspluatatsiyasi (jumladan harbiy 
    harakatlarga jalb qilinishi) yuzasidan Hamid Sodiq mamlakatning migratsiya va ta'lim 
    siyosatidagi muammolarni tahlil qildi.
  type: geopolitical
  analysis: >
    U migrantlarning asosiy muammosi faqat iqtisodiyot emas, balki siyosiy tizimni anglamaslik
    va til bilmaslikda ekanligini, natijada ulardan "arzon ishchi kuchi" va "askar" sifatida 
    foydalanilayotganini tarkibiy qaramlik deb tahlil qildi.
  prediction: >
    Agar faqat bugungi iqtisodiy foyda (pul o'tkazmalari) o'ylansa, 10 yildan so'ng mamlakat 
    sog'lig'ini butkul yo'qotgan migrantlar sababli ommaviy sog'liqni saqlash inqiroziga 
    yuz tutishini bashorat qildi.
  source: "The Times of Central Asia, Fevral 2026"

- id: t-2026-diplomat-university
  date: "2025-2026"
  title: "Diplomat University'da Siyosiy Ta'lim"
  description: >
    Hamid Sodiq Diplomat University'da tashqi siyosat, huquq va diplomatiya yo'nalishlarida
    dars berishni hamda xalqaro jarayonlarni muhokama qiluvchi "Diplomat Podcast" loyihasini
    boshladi.
  type: academic
  analysis: >
    U har qanday axborot qanday tahlil qilinishiga qarab o'z mohiyatini o'zgartirishini
    uqtirib, davlatning kelajakdagi tashqi siyosati malakali va mustaqil tahlilchilarga
    suyanishi kerakligini ta'kidladi.
  prediction: >
    Yosh kadrlarda tanqidiy-analitik fikrlashni kuchaytirish orqaligina mamlakat yirik 
    geosiyosiy bosimlar oldida o'z strategik o'rnini mustahkamlay olishi bildiriladi.
  source: "Diplomat University"