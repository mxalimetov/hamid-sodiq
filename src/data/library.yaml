- id: why-nations-fail
  title: "Why Nations Fail: The Origins of Power, Prosperity, and Poverty"
  author: "Daron Acemoglu & James A. Robinson"
  topic: "Siyosiy Iqtisodiyot"
  year: 2012
  commentary: >
    Asemoglu va Robinson Nigeriyaning rivojlanish muvaffaqiyatsizliklarini
    jiddiy diagnostika qilish uchun zarur bo'lgan analitik vositalarni taqdim
    etadilar. Ekstraktiv va inklyuziv institutlar o'rtasidagi farq akademik
    emas — bu Nigeriya boyligicha qolayotganining eng aniq tushuntirishidir.
  notes: >
    Asosiy tushuncha: Ekstraktiv institutlar kuch va boylikni ozchilik qo'lida
    to'playdi va kuchga ega bo'lganlar o'zgarishga qarshilik ko'rsatadigan
    ayovsiz doira yaratadi.

- id: development-as-freedom
  title: "Development as Freedom"
  author: "Amartya Sen"
  topic: "Rivojlanish Iqtisodiyoti"
  year: 1999
  commentary: >
    Senning qobiliyat yondashuvi taraqqiyotni YaIM o'sishi emas, balki insoniy
    erkinliklarning kengayishi sifatida qayta belgilaydi. Bu falsafiy siljish
    Nigeriya rivojlanishi haqidagi har qanday mazmunli muloqot uchun zarurdir.
  notes: >
    Sen beshta instrumental erkinlikni aniqlaydi: siyosiy erkinliklar, iqtisodiy
    imkoniyatlar, ijtimoiy imkoniyatlar, shaffoflik kafolatlari va himoya
    xavfsizligi.
